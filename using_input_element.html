<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<header><h1>Basic Calculator</h1></header>

<body>
<main>
    <div class="flex">
        <div id="a"> No 1 <input type="number" id="t1" value="0"></div>
        <div>No 2 <input type="number" id="t2" value="0"></div>
        <div>totel <input id="r" type="number" value="0" id="t2"></div>
    </div>

    <div class="button">

        <button onclick="f1()">+</button>
        <button onclick="f2()">--</button>
        <button onclick="f3()">*</button>
        <button onclick="f4()">/</button>
    </div>
</main>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
        }
        .button{
            text-align: center;
            

        }
        .button button{
            padding: 2px 10px;
            margin: 0px 10px;
            cursor: pointer;
        }

        h1{
            background-color: rgb(0, 134, 252);
            text-align: center;
            color: white;
        }
        
        main:hover{
            transform: translateY(-8px);
        }
        .flex {
            justify-content: center;
            align-items: center;
            display: flex;
            flex-direction: column;
            gap: 25px;
            padding: 20px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;

        }
        .flex input{
            height: 25px;
        }
        main{
            transition: 0.2s all ease;
            margin-top: 250px;
            margin-left: 35%;
            border-radius: 10px;
           background-color: aliceblue;
            padding: 25px;
            box-shadow: 1px 5px 10px rgb(43, 106, 118) ;
            width: 30%;

        }
    </style>

    <script>
        var n1 = document.getElementById("t1")
        var n2 = document.getElementById("t2")
        var n3 = document.getElementById("r")
        function f1() {
            var sum = parseInt(n1.value) + parseInt(n2.value)
            n3.value = sum
        }

        function f2() {
            var sum = parseInt(n1.value) - parseInt(n2.value)
            n3.value = sum
        }

        function f3() {
            var sum = parseInt(n1.value) * parseInt(n2.value)
            n3.value = sum
        }
        function f4() {
            var sum = parseInt(n1.value) / parseInt(n2.value)
            n3.value = sum
        }



    </script>


</body>

</html>
