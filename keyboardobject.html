<body>

        var mycolor = document.getElementById("mycolor")

        var r = 10

        c.width = window.innerWidth;
        c.height = window.innerHeight;
        var red, green, blue, drawcolor
        var drawmode = false

        mycolor.onchange = function()
        {
            drawcolor = this.value
        }

        function f1(event) 
        {
            // alert(event.keyCode)
            k = event.key
            switch (k) 
            {
                case "r":
                    if (r < 100) {
                        r = r + 1
                        document.title = r
                    }
                    break;
                case "t":
                    if (r > 10) {
                        r = r - 1
                        document.title = r
                    }
                    break;

                case " ":
                    d.clearRect(0, 0, window.innerWidth, window.innerHeight)
                    break;

            }
         
        }

            {

            green = Math.round(Math.random() * 255)
            blue = Math.round(Math.random() * 255)
            drawcolor = "rgb(" + red + "," + green + "," + blue + ")"

        function f2() 
        {

           document.title = drawmode

        document.addEventListener("keydown", f1)

</body>

</html>
