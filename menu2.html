<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu" />
<style>
    #menu
    {
        box-shadow: 4px 4px 4px gray;
        background: red;
        width:25px;
        text-align:center;
        cursor:pointer;
        color:white;
        text-align:left;

    }

    ol
    {
       list-style:none;
       display:none;


    }
    #menu:hover
    {
        width:100px;

    }
    #menu:hover ol
    {
        display:block;


    }
    li
    {
        background:red;
        padding:10px;
        cursor:pointer;
        margin-left:-40px;
        color:white;

    }

    li:hover
    {
        background-color: black;
        
    }


</style>
<body>

    <main>
        <div id="menu">
            <span style="background:rd" class="material-symbols-outlined">menu</span>
            <ol>
                <li>Home</li>
                <li>About</li>
                <li>Contact</li>
                <li>products</li>
                <li>Services</li>
            </ol>
        </div>
    </main>
    
</body>
</html>
