<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<header><h1>Menu</h1></header>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu" />
<style>
    #menu
    {
        box-shadow: 4px 4px 4px gray;
        background: rgb(184, 145, 145);
        width:25px;
        text-align:center;
    
        cursor:pointer;
        color:white;
        text-align:left;
        margin-left: 500px;
        margin-top: 150px;




    }
    h1{
        font-size: 50px;
        color: rgb(0, 0, 0);
        background-color: aliceblue;
        text-align: center;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }

    
    ol
    {
       list-style:none;
       display:none;


    }
    #menu:hover
    {
        width:100px;

    }
    #menu:hover ol
    {
        display:block;


    }
    li
    {
        background:rgb(142, 27, 27);
        padding:10px;
        cursor:pointer;
        margin-left:-40px;
        color:white;

    }

    li:hover
    {
        background-color: rgb(0, 0, 0);
        
    }
    body{
        background-color: rgb(252, 227, 231);
    }


</style>
<body>

    <main>
        <div id="menu">
            <span style="background:rd" class="material-symbols-outlined">menu</span>
            <ol>
                <li>Home</li>
                <li>About</li>
                <li>Contact</li>
                <li>products</li>
                <li>Services</li>
            </ol>
        </div>
    </main>
    
</body>
</html>
