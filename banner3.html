<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <h1>Runbanner</h1>
</head>
<style>
    h1{
        text-align: center;
        font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif ;
        font-size: 3rem;
        letter-spacing: 2px;
        margin: 20px 0;
        color: #141313;
        text-transform: uppercase;
        
    }
    .pic{
        width: 70%;
        height: 600px;
        position: absolute;
        left: 230px;
        transition: 2s;
    }
</style>
<header>
    <img src="images/1.jpeg" class="pic">
    <img src="images/2.jpg" class="pic">
    <img src="images/3.jpg" class="pic">
    <img src="images/4.jpg" class="pic">
    <img src="images/5.jpg" class="pic">


</header>
<body>
    <script>
        // finding images in DOM

        var plist = document.getElementsByTagName("img")
        var p1 = plist[4]
        var p2 = plist[3]
        var p3 = plist[2]
        var p4 = plist[1]
        var p5 = plist[0]

        var c = -1

        function runbanner()
        {

            switch(c)
            {

                case 0 :
            // p1.style.transform="scale(0) rotate(360deg)"
            p1.style.opacity = 0
            break;


            case 1 :
            //    p2.style.transform="scale(0) rotate(360deg)"
            p2.style.opacity = 0
            break;

             case 2 :
            //    p3.style.transform="scale(0) rotate(360deg)"
            p3.style.opacity = 0
            break;


             case 3 :
            //    p4.style.transform="scale(0) rotate(360deg)"
            p4.style.opacity = 0
            break;


            case 4 :
            //    p5.style.transform="scale(0) rotate(360deg)"
            p5.style.opacity = 0
            break;

            case 5 :
                // p1.style.transform="scale(1) rotate(0)"
                //  p2.style.transform="scale(1) rotate(0)"
                //   p3.style.transform="scale(1) rotate(0)"
                //   p4.style.transform="scale(1) rotate(0)"
                //    p5.style.transform="scale(1) rotate(0)"


                   p1.style.opacity = 1
                    p2.style.opacity = 1
                      p3.style.opacity = 1
                        p4.style.opacity = 1
                         p5.style.opacity = 1

                         break;


            }

            if(c<=plist.length)
            {
                c++
            }
            else
            {
                c=0
            }
            document.title = "amit"

            setTimeout("runbanner()",1500)
            

            
            
            

        }
        runbanner()
        // document.title = "ma"
    </script>
    
</body>
</html>
