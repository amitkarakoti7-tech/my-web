<style>
     * {
        padding: 0%;
        margin: 0%
    }

    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    header{
      font-family: poppins;
      margin: auto; margin-top: 3%;
      justify-content: center;
      padding: 20px;
      text-align: center;
       font-size: 40px;
       /* font-weight: 700; */
       color: rgb(228, 68, 68);
       background-color: rgb(255, 222, 222);
       width: 40%;
       border-radius: 8px;
      transition: all 0.3s ease;
      cursor:progress;
    }
    header:hover {
        box-shadow: 0px 5px 10px gray;
    }
    .banner {
        width: 800px;
        height: 400px;
        margin: auto;
        overflow: hidden;
        position: relative;
         margin-top: 2%; 
         /* margin-bottom: 2%; */
        border-radius: 7px;

    }
    .banner img
    {
        width: 100%;
        height: 100%;

    }
    .banner img.active{
        display:block;
    }
    .radios
    {
        text-align: center;
        margin-bottom: 2%;
        margin-top: 10px;

    }
    footer {
       
        background-color: #141e25;
        color: white;
        display: flex;
        justify-content: space-between;
        gap: 28px;
        flex-wrap: wrap;
        font-family: Arial, Helvetica, sans-serif;
        padding: 45px 8%
    }

    footer div p a {
        color: rgb(27, 11, 255);

    }

    div.cop {
        text-align: center;
        background-color: white;
        margin: 0%;
        padding: 0%;


    }
    
</style>

<body onload="show()">

    <div class="banner">
        <img src="images/1.jpg" id="p" class="active">
    </div>

    <div class="radios">
        <input type="radio" name="slide" id="r1">
        <input type="radio" name="slide" id="r2">
        <input type="radio" name="slide" id="r3">
        <input type="radio" name="slide" id="r4">
    </div>

    <script>
        var p = document.getElementById("p");
        var s = document.getElementsByName("slide");
        var c = 0;

        s[c].checked = true;

        var t;

        function show() 
        {
            if(c<=s.length-1)
            {
                c++
            }
            else
            {
                c=1;
            }
            p.src="images/"+c+".jpg";


            s[c-1].checked = true;

            // document.title = c
            t = setTimeout("show()", 2000);

            s[0].onclick = function()
            {
                clearTimeout(t);
                setTimeout("p.src='images/1.jpg'",1000);
                c=1
                setTimeout("show()", 6000);

            }

            s[1].onclick = function()
            {
                clearTimeout(t);

                setTimeout("p.src='images/2.jpg'", 1000);
                c=2
                setTimeout("show()", 6000);

            }

            s[2].onclick = function()
            {
                clearTimeout(t);

                setTimeout("p.src='images/3.jpg'",1000);
                c=3
                setTimeout("show()", 6000);
            }

            s[3].onclick = function()
            {
                clearTimeout(t);
                setTimeout("p.src='images/4.jpg'", 1000);


                c=4
                setTimeout("show()", 6000);
            }


          
            
        }
    </script>
    
</body>
