<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    button{
        width: 25px;
        height: 25px;
        border-radius:100px;
       
        cursor: pointer;


    }
    body{
       
        width: 40%;
        height: 200px;
        margin-left: 400px;
        justify-content: center;
        margin-top: 200px;
        padding: 40px;
        color: rgb(208, 62, 62);
        border-radius: 10px;
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: 600;
    }
   
</style>
<body>
    <h1>Color Box</h1>
    <table border="0" cellpadding="1"></table>
    <script>
        var row = 10
        var col = 10
        var c = 1
        while(c<=row)
    {

        document.write("<tr>")
            for(var i = 1;i<=col;i++)
                {

                var red = Math.round(Math.random()*255)
        var green = Math.round(Math.random()*255)
        var blue = Math.round(Math.random()*255)
        var mycolor=`rgb(${red},${green},${blue})`

                    document.write(",<td><button onclick='setcolor(this)'style='colorr:red;background:"+mycolor+"'></button>")

                     }
                     document.write("</tr>")

                     c++

                     function setcolor(d)
                     {
                        //alert(mii)
                        document.body.style.background = d.style.background
                     }
            
    } 
    document.title ="Ready"

    </script>
    
</body>
</html>
