<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu" />
<style>
#menu
{
    //background-color: green;
    width: 25px;
    height: 20px;

}
ol{
    background-color: antiquewhite;
    list-style: none;
    transition: 0.53s;
    margin-left:left:-230px;
    position:relative;
    left:-200px;
    top:-23px;


}
ol li{
    padding: 10px;
    margin-left:-40px;
}
ol li:hover
{
    background-color: blueviolet;
    width:100px;
    cursor: pointer;
}

#menu:hover ol{
    left:0px;
    width:100px;
    cursor:pointer;
}





</style>
<body>

    <main>
        <div id="menu">
            <span style="background:rd" class="material-symbols-outlined">menu</span>
            <ol>
                <li>Home</li>
                <li>About</li>
                <li>contact</li>
                <li>products</li>
                <li>Services</li>
            </ol>
        </div>
    </main>
</body>
