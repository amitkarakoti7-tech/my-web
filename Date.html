<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

    *{
        padding: 0px;
        margin: 0px;
        
    }
    #clock
    {
        color: white;
        font-size: 50px;
        font-family: Arial, Helvetica, sans-serif;
        background-color: purple;
        width: 250px;
        padding: 30px;
        margin-top: 40px;
        margin-left: 30px;
        text-align: center;
        box-shadow: 10px 10px 10px gray;
        border-radius: 10px;
       

    }
    button{
        background-color: aqua;
        height: 35px;
        width: 40px;
        margin-top: 30px;
        margin-left: 30px;
        border-radius: 10px;
        cursor: pointer;
        
        text-align: center;
        
    }
    h1{
        background-color: rgb(112, 253, 255);
        text-align: center;
    }

</style>

<body>
    <h1>working with Date class in js</h1>
    <div id="clock">Date</div>
    <button onclick="st()">Start clock </button>
    <button onclick="sto()">stop clock</button>
    <script>
        function show()
        {
        var d = new Date()
        var t = document.getElementById("clock")
        t.innerHTML = d.toLocaleString()
        }
        var timer
        function st()
        {
            timer = setInterval("show()",1000)
        }

        function sto()
        {
            clearInterval(timer)
        }

        document.title="No Error"

    </script>
    
</body>
</html>
