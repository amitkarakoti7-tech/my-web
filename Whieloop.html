<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    table{
        margin: auto;
        margin-top: 30px;
    }
    h1{
        text-align: center;
        background-color: aqua;
        /* height: 80px; */
        width: 50%;
        padding: 20px;
        margin: auto;
        border-radius: 8px;
        transition: all 0.3s ease;
    }
    h1:hover{
        box-shadow: 0px 5px 10px gray;
    }
</style>

<body>
    <h1>Working width While Loop in JavaScript</h1>
    <table border="1" cellpadding="10">
        <script>
            let row = prompt("Enter Row number to Create Table..", "5")
            let col = prompt("Enter column to Create Table..", "5")
            let c = 1


            while(c <= row)
            {   

                document.write("<tr>")
                for (let i = 1; i <= col; i++) {
                    document.write("<td><input type='text'></td>")
                }
                document.write("</tr>")

                c++
            }
        </script>
    </table>

</body>

</html>
