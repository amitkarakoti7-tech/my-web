<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Working width While Loop in JavaScript</h1>
    <table border="1" cellpadding="10">
        <script>
            let row = prompt("Enter Row number to Create Table..", "5")
            let col = prompt("Enter column to Create Table..", "5")
            let c = 1


            while(c <= row)
            {   

                document.write("<tr>")
                for (let i = 1; i <= col; i++) {
                    document.write("<td><input type='text'></td>")
                }
                document.write("</tr>")

                c++
            }
        </script>
    </table>

</body>

</html>
