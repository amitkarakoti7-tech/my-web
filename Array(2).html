<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<h1>Array</h1>
<style>

    *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }

    body{
        width: 100vw;
    }
    h1{
        text-align: center;
        font-weight: 800;
        font-size: 40px;

    }
    .mystyle
    {
        width: 35%;
        margin: 25px;
         /* margin-left: 90px;  */
        border-radius: 12px;
        /* display: flex;  */
       
       
        /* box-shadow: 10px 10px 10px gray; */
    }
    #box11{
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        width: 100%;
        display: flex;
        /* flex-direction: column; */
    }
</style>
<body>

    <div id="box11"></div>
    <script>
        let box = document.getElementById("box11")
        let pic = ["https://i.pinimg.com/736x/a6/32/db/a632db6f4c9593e35f1cbb6418dcfd20.jpg","https://i.pinimg.com/736x/b6/46/c6/b646c6c7903410733bafc8ef524cea8f.jpg","https://i.pinimg.com/736x/0e/ec/92/0eec92c7f67e7188e852206b68ff4d9a.jpg","https://i.pinimg.com/736x/92/59/d8/9259d84108f01e8a8e3629d18ef37252.jpg","https://i.pinimg.com/736x/94/2d/39/942d39af06ce95cdd603370790fd6c41.jpg","https://i.pinimg.com/736x/e5/be/a7/e5bea7f30bf6718abffd752274f42e3a.jpg"]

        for(let i =0;i<pic.length;i++)
    {
        box.innerHTML +=("<img class='mystyle' src='"+pic[i]+"'>")
    }
    document.title="no"
    </script>
    
</body>
</html>
